{% extends 'shared/base.html' %}
{% block title %}Create Assignment — EduClass{% endblock %}

{% block content %}
<div class="page-header">
  <h1>📝 Create Assignment</h1>
  <a href="{{ url_for('classwork', class_id=cls.id) }}" class="btn btn-ghost">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:640px;">
  <div class="card-body" style="padding:28px;">
    <form method="POST"
          action="{{ url_for('create_assignment', class_id=cls.id) }}">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-control"
               placeholder="e.g. Chapter 3 Quiz" required>
      </div>
      <div class="form-group">
        <label class="form-label">Instructions</label>
        <textarea name="description" class="form-control" rows="5"
                  placeholder="Describe the assignment in detail..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">Due Date &amp; Time</label>
          <input type="datetime-local" name="due_date" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Total Marks</label>
          <input type="number" name="total_marks" class="form-control"
                 value="100" min="1" max="1000">
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
        <a href="{{ url_for('classwork', class_id=cls.id) }}"
           class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-paper-plane"></i> Create Assignment
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
